# Bandit security scanner config (https://bandit.readthedocs.io/)
# Run: bandit -c pyproject.toml -r .

[tool.bandit]
# Skip noisy dirs; venv may not exist in CI but harmless
# "scripts" = dev tooling (e.g. md→docx), not production attack surface
exclude_dirs = [".venv", "venv", ".git", "node_modules", "scripts"]
# B101: assert in pytest tests
# B104: binding to 0.0.0.0 is required for Flask in Docker/EC2 (external traffic to the container)
skips = ["B101", "B104"]
