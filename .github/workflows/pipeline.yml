name: Techflow Python Pipeline
on:
  push:
    branches:
    - main

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: pytest test_app.py -v

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                    ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
  
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:latest

            # Tag current container as previous stable
            if [ "$(docker ps -q -f name=techflow-app)" ]; then
                docker commit techflow-app ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:previous_stable
                docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-app:previous_stable
            fi

            # Pull new image
            docker pull $IMAGE

            # Stop old container
            docker stop techflow-app || true
            docker rm techflow-app || true

            # Start new container
            docker run -d \
              --name techflow-app \
              -p 80:5000 \
              $IMAGE

            # Run health check
            bash /home/ubuntu/health_check.sh

      - name: Rollback if deployment fails
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            bash /home/ubuntu/rollback.sh

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: Deployment Successful
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI/CD Pipeline
          body: |
            Deployment succeeded!

            Commit: ${{ github.sha }}
            Repo: ${{ github.repository }}

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: Deployment Failed
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI/CD Pipeline
          body: |
            Deployment FAILED.

            Commit: ${{ github.sha }}
            Repo: ${{ github.repository }}